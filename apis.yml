aid: sync-api
name: Sync API
description: >-
  Sync API is an enterprise API platform for the in-app mobile advertising
  ecosystem, delivering performance, transparency, and control for marketers.
  The platform provides a bidder platform and suite of APIs for user acquisition,
  mobile user growth, and user re-engagement. It enables data-driven, ROI-focused
  mobile advertising across 1.2 billion global audiences in 50+ countries, with
  500+ robust API integrations and advanced algorithms for LTV forecasting and
  in-app event conversion tracking.
